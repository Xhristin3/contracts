[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[profile.default.optimizer]
enabled = true
runs = 200

[profile.default.model_checker]
contracts = { "src/GrantStream.sol" = [ "GrantStream" ] }
engine = "chc"
timeout = 10000
targets = [ "assert" ]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 1000
depth = 50
